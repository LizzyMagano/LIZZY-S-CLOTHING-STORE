<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Lizzy's Clothing Store</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .feedback-card {
            background: white;
            padding: 2.2rem 2.8rem;
            border-radius: 28px;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.12);
            max-width: 580px;
            width: 100%;
            transition: 0.2s;
        }
        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            color: #0b1e33;
            margin-top: 0;
            margin-bottom: 0.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .subhead {
            color: #475569;
            margin-bottom: 2rem;
            font-size: 0.95rem;
            border-bottom: 2px solid #eef2f6;
            padding-bottom: 0.9rem;
        }
        .form-group {
            margin-bottom: 1.4rem;
        }
        label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: #1e293b;
            margin-bottom: 0.25rem;
        }
        input[type="text"],
        input[type="email"],
        textarea,
        select {
            width: 100%;
            padding: 0.7rem 0.9rem;
            border: 1px solid #d1d9e6;
            border-radius: 14px;
            font-size: 0.95rem;
            background: #fafcff;
            transition: 0.2s;
            box-sizing: border-box;
            font-family: inherit;
        }
        input:focus, textarea:focus, select:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 4px rgba(37,99,235,0.08);
            background: white;
        }
        textarea {
            resize: vertical;
            min-height: 90px;
        }
        .radio-group, .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem 1.8rem;
            align-items: center;
            margin-top: 0.2rem;
        }
        .radio-group label, .checkbox-group label {
            font-weight: 400;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            color: #1e293b;
        }
        .inline-label {
            display: inline-block;
            margin-right: 0.5rem;
        }
        fieldset {
            border: 1px solid #e2e8f0;
            border-radius: 18px;
            padding: 1.2rem 1.5rem 0.8rem;
            margin: 1.2rem 0 0.8rem;
        }
        legend {
            font-weight: 600;
            padding: 0 0.6rem;
            color: #0b1e33;
            font-size: 0.95rem;
        }
        .btn-submit {
            background: #2563eb;
            color: white;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1.05rem;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 0.5rem;
            letter-spacing: 0.3px;
        }
        .btn-submit:hover {
            background: #1d4ed8;
            transform: scale(1.01);
            box-shadow: 0 8px 20px -6px #2563eb60;
        }
        .btn-submit:active {
            transform: scale(0.97);
        }
        .note {
            font-size: 0.8rem;
            color: #64748b;
            text-align: center;
            margin-top: 1.2rem;
        }
        .hr-divider {
            border: 0;
            border-top: 2px dashed #e2e8f0;
            margin: 1.8rem 0 0.5rem;
        }
        .optional-badge {
            font-weight: 400;
            font-size: 0.7rem;
            background: #eef2f6;
            padding: 0.1rem 0.6rem;
            border-radius: 30px;
            color: #475569;
            margin-left: 0.4rem;
        }
        .star-rating {
            display: flex;
            gap: 0.2rem;
            font-size: 1.8rem;
            margin: 0.2rem 0 0.2rem;
        }
        .star-rating input {
            display: none;
        }
        .star-rating label {
            color: #cbd5e1;
            cursor: pointer;
            transition: 0.15s;
        }
        .star-rating label:hover,
        .star-rating label:hover ~ label,
        .star-rating input:checked ~ label {
            color: #fbbf24;
        }
        .star-rating {
            direction: rtl;
            unicode-bidi: bidi-override;
            display: inline-flex;
        }
        .star-rating label {
            font-size: 2rem;
            padding: 0 0.1rem;
        }
    </style>
</head>
<body>

<div class="feedback-card">
    <h1>
        <span>📝</span> Feedback
    </h1>
    <div class="subhead">We value your opinion — help us improve.</div>

    <!-- ===== MAIN FEEDBACK FORM ===== -->
    <form action="Thanks.html" method="get" id="feedbackForm">

        <!-- Rating (star system) -->
        <div class="form-group">
            <label>How would you rate your experience?</label>
            <div class="star-rating" id="starRating">
                <input type="radio" name="rating" id="star5" value="5">
                <label for="star5" title="5 stars">★</label>
                <input type="radio" name="rating" id="star4" value="4">
                <label for="star4" title="4 stars">★</label>
                <input type="radio" name="rating" id="star3" value="3" checked>
                <label for="star3" title="3 stars">★</label>
                <input type="radio" name="rating" id="star2" value="2">
                <label for="star2" title="2 stars">★</label>
                <input type="radio" name="rating" id="star1" value="1">
                <label for="star1" title="1 star">★</label>
            </div>
        </div>

        <!-- Feedback message -->
        <div class="form-group">
            <label for="feedbackMsg">Your feedback</label>
            <textarea id="feedbackMsg" name="message" placeholder="Tell us what you think..." required></textarea>
        </div>

        <!-- Category dropdown -->
        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category">
                <option value="">Select a topic...</option>
                <option value="product">Products</option>
                <option value="service">Service</option>
                <option value="delivery">Delivery</option>
                <option value="website">Website experience</option>
                <option value="other">Other</option>
            </select>
        </div>

        <!-- Recommendation (radio) -->
        <div class="form-group">
            <span style="font-weight: 600; color: #1e293b; display: block; margin-bottom: 0.2rem;">Would you recommend us?</span>
            <div class="radio-group">
                <label><input type="radio" name="recommend" value="yes" checked> Definitely</label>
                <label><input type="radio" name="recommend" value="maybe"> Maybe</label>
                <label><input type="radio" name="recommend" value="no"> Not really</label>
            </div>
        </div>

        <!-- Optional: fieldset with extra info (keeps structure but no contact) -->
        <fieldset>
            <legend>📌 Additional details <span class="optional-badge">optional</span></legend>
            <div class="form-group" style="margin-bottom: 0.8rem;">
                <label for="orderNumber">Order number (if applicable)</label>
                <input type="text" id="orderNumber" name="order_id" placeholder="e.g. #1234">
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label for="visitDate">Date of visit</label>
                <input type="date" id="visitDate" name="visit_date">
            </div>
        </fieldset>

        <!-- Submit -->
        <button type="submit" class="btn-submit">✨ Send Feedback</button>
        <p class="note">You'll be redirected to a thank-you page after submitting.</p>
    </form>

    

    <p style="font-size: 0.75rem; color: #94a3b8; margin-top: 1.2rem; text-align: center;">
        All feedback is confidential and helps us serve you better.
    </p>
</div>

</body>
</html>
