<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Clothing - Cart</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f4f4f9;
    }
    .card-img-top {
      height: 220px;
      object-fit: cover;
      background-color: #e9ecef;
    }
    .btn-remove {
      background-color: #dc3545;
      border-color: #dc3545;
      color: #fff;
    }
    .btn-remove:hover {
      background-color: #bb2d3b;
      border-color: #b02a37;
      color: #fff;
    }
    .btn-buy {
      background-color: #0d6efd;
      border-color: #0d6efd;
      color: #fff;
    }
    .btn-buy:hover {
      background-color: #0b5ed7;
      border-color: #0a58ca;
      color: #fff;
    }
    .action-buttons .btn {
      min-width: 100px;
    }
    .card-footer {
      background-color: transparent;
      border-top: none;
      padding-top: 0;
    }
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
    }
    .modal-backdrop {
      z-index: 1040;
    }
    .cart-item-checkbox {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #0d6efd;
    }
    .selected-count {
      font-weight: 600;
      color: #0d6efd;
    }
    .bulk-actions {
      background: white;
      border-radius: 12px;
      padding: 16px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .bulk-actions .left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .bulk-actions .right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn-bulk-buy {
      background: #25D366;
      border: none;
      color: white;
      padding: 8px 24px;
      border-radius: 60px;
      font-weight: 600;
    }
    .btn-bulk-buy:hover {
      background: #1da851;
      color: white;
    }
    .btn-select-all {
      background: #e9ecef;
      border: none;
      padding: 8px 16px;
      border-radius: 60px;
      font-weight: 500;
      font-size: 0.9rem;
    }
    .btn-select-all:hover {
      background: #dee2e6;
    }
    .cart-item-card {
      position: relative;
    }
    .cart-item-card .checkbox-wrapper {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 5;
      background: rgba(255,255,255,0.9);
      padding: 4px 8px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .card .card-body {
      padding-top: 8px;
    }
    @media (max-width: 576px) {
      .bulk-actions {
        flex-direction: column;
        align-items: stretch;
      }
      .bulk-actions .left {
        justify-content: center;
      }
      .bulk-actions .right {
        justify-content: center;
      }
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Lizzy's Clothing Store</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="service.html">Service</a></li>
          <li class="nav-item"><a class="nav-link active" href="cart.html">Cart</a></li>
          <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="feedback.html">Feedback</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Cart Section -->
  <main class="container my-5">
    <h1 class="mb-4">🛍️ Your Clothing Collection</h1>

    <!-- Bulk Actions Bar -->
    <div id="bulkActions" class="bulk-actions" style="display: none;">
      <div class="left">
        <span>Select: </span>
        <button class="btn-select-all" onclick="selectAllItems()">Select All</button>
        <button class="btn-select-all" onclick="deselectAllItems()">Deselect All</button>
        <span class="selected-count" id="selectedCount">0 selected</span>
      </div>
      <div class="right">
        <button class="btn-bulk-buy" onclick="bulkBuy()">
          <i class="fas fa-shopping-bag me-1"></i> Buy Selected (<span id="bulkCount">0</span>)
        </button>
      </div>
    </div>

    <div id="cart-items" class="row g-4"></div>

    <!-- Empty Cart Message -->
    <div id="emptyCart" class="text-center py-5" style="display: none;">
      <i class="fas fa-shopping-cart fa-4x text-muted mb-3"></i>
      <h4>Your cart is empty</h4>
      <p class="text-muted">Visit the <a href="shop.html">Shop</a> to add items.</p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-3 mt-5">
    <p class="mb-0">&copy; 2025 Lizzy Magano</p>
  </footer>

  <!-- Toast container for messages -->
  <div class="toast-container">
    <div id="orderToast" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body" id="toastMessage">
          ✅ Order placed successfully!
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    </div>
  </div>

  <!-- Buy Modal (for individual items) -->
  <div class="modal fade" id="buyModal" tabindex="-1" aria-labelledby="buyModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="buyModalLabel">🛒 Complete Your Purchase</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="buyForm">
            <input type="hidden" id="buyItemIndex" value="">
            <input type="hidden" id="buyMode" value="single">

            <div class="mb-3">
              <label for="customerName" class="form-label">👤 Your Name <span class="text-danger">*</span></label>
              <input type="text" id="customerName" class="form-control" placeholder="Enter your full name" required>
            </div>
            <div class="mb-3">
              <label for="customerEmail" class="form-label">📧 Email Address <span class="text-danger">*</span></label>
              <input type="email" id="customerEmail" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="mb-3">
              <label for="customerPhone" class="form-label">📱 Phone Number <span class="text-danger">*</span></label>
              <input type="tel" id="customerPhone" class="form-control" placeholder="+267 78 549 270" required>
            </div>
            <hr>
            <div class="mb-3">
              <label for="buyColor" class="form-label">🎨 Color <span class="text-danger">*</span></label>
              <select id="buyColor" class="form-select" required>
                <option value="">Select color...</option>
                <option value="Red">Red</option>
                <option value="Black">Black</option>
                <option value="Blue">Blue</option>
                <option value="Pink">Pink</option>
                <option value="White">White</option>
                <option value="Yellow">Yellow</option>
                <option value="Green">Green</option>
                <option value="Gray">Gray</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="buySize" class="form-label">📏 Size <span class="text-danger">*</span></label>
              <select id="buySize" class="form-select" required>
                <option value="">Select size...</option>
                <option value="S">S</option>
                <option value="M">M</option>
                <option value="L">L</option>
                <option value="XL">XL</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="buyService" class="form-label">📬 Service Method <span class="text-danger">*</span></label>
              <select id="buyService" class="form-select" required>
                <option value="">Select service...</option>
                <option value="Delivery">🚚 Delivery</option>
                <option value="Pickup">🏪 Pickup</option>
                <option value="Express">⚡ Express Delivery</option>
              </select>
            </div>
            <div id="bulkItemsList" class="mb-3" style="display: none;">
              <label class="form-label fw-bold">📦 Items in this order:</label>
              <ul id="bulkItemsUl" class="list-unstyled small"></ul>
              <p class="fw-bold text-success">Total: P<span id="bulkTotalPrice">0.00</span></p>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-success" id="confirmBuyBtn">✅ Place Order</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Cart Logic with Supabase -->
  <script type="module">
    // ============================================================
    //  🔧  SUPABASE CONFIGURATION (same as shop.html)
    // ============================================================
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://wmebpsheblrkuvygguae.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_rUkBj0Th3x6ZXGbPkLGsHQ_f5WG3jB_";
    const ORDERS_TABLE = 'shop_orders';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    // ============================================================

    // -------- GLOBAL HELPERS --------
    function showToast(message) {
      const toastEl = document.getElementById('orderToast');
      const msgEl = document.getElementById('toastMessage');
      msgEl.textContent = message;
      const toast = new bootstrap.Toast(toastEl, { delay: 3500 });
      toast.show();
    }

    // -------- CART MANAGEMENT --------
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    const cartItemsDiv = document.getElementById("cart-items");
    const emptyCartDiv = document.getElementById("emptyCart");
    const bulkActionsDiv = document.getElementById("bulkActions");
    let selectedItems = [];

    function saveAndRender() {
      localStorage.setItem("cart", JSON.stringify(cart));
      renderCart();
    }

    // ========== SUPABASE INSERT ==========
    async function saveOrderToSupabase(orderData) {
      const url = `${SUPABASE_URL}/rest/v1/${ORDERS_TABLE}`;
      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          },
          body: JSON.stringify(orderData)
        });
        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`Supabase error ${response.status}: ${errorText}`);
        }
        return await response.json();
      } catch (err) {
        console.error('Supabase insert failed:', err);
        throw err;
      }
    }

    // ========== SAVE MULTIPLE ORDERS ==========
    async function saveMultipleOrdersToSupabase(orders) {
      const results = [];
      for (const order of orders) {
        try {
          const result = await saveOrderToSupabase(order);
          results.push({ success: true, data: result });
        } catch (err) {
          results.push({ success: false, error: err });
        }
      }
      return results;
    }

    // -------- RENDER CART --------
    function renderCart() {
      cartItemsDiv.innerHTML = '';

      if (cart.length === 0) {
        emptyCartDiv.style.display = 'block';
        bulkActionsDiv.style.display = 'none';
        return;
      }

      emptyCartDiv.style.display = 'none';
      bulkActionsDiv.style.display = 'flex';
      selectedItems = [];

      cart.forEach((item, index) => {
        const card = document.createElement("div");
        card.className = "col-md-4 mb-4 cart-item-card";
        card.dataset.index = index;
        card.innerHTML = `
          <div class="card shadow-sm h-100">
            <div class="checkbox-wrapper">
              <input type="checkbox" class="cart-item-checkbox" data-index="${index}" onchange="updateSelectedCount()">
            </div>
            <img src="${item.image || 'https://via.placeholder.com/300x220?text=No+Image'}" class="card-img-top" alt="${item.name || 'Item'}" onerror="this.src='https://via.placeholder.com/300x220?text=No+Image'">
            <div class="card-body">
              <h5 class="card-title">${item.name || 'Unnamed'}</h5>
              <p class="card-text">Price: P${item.price !== undefined ? item.price : '0.00'}</p>
              <p class="card-text">Color: ${item.selectedColor || 'N/A'}</p>
              <p class="card-text">Size: ${item.selectedSize || 'N/A'}</p>
            </div>
            <div class="card-footer d-flex justify-content-between align-items-center action-buttons">
              <button class="btn btn-remove btn-sm" data-index="${index}">🗑️ Remove</button>
              <button class="btn btn-buy btn-sm buy-now-btn" data-index="${index}">🛒 Buy Now</button>
            </div>
          </div>
        `;
        cartItemsDiv.appendChild(card);
      });

      // Attach remove event listeners
      document.querySelectorAll('.btn-remove').forEach(btn => {
        btn.addEventListener('click', function(e) {
          const idx = parseInt(this.getAttribute('data-index'), 10);
          if (!isNaN(idx) && idx >= 0 && idx < cart.length) {
            cart.splice(idx, 1);
            saveAndRender();
            showToast('🗑️ Item removed from cart');
          }
        });
      });

      // Attach buy event listeners
      document.querySelectorAll('.buy-now-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          const idx = parseInt(this.getAttribute('data-index'), 10);
          if (!isNaN(idx) && idx >= 0 && idx < cart.length) {
            openBuyModal(idx);
          }
        });
      });

      updateSelectedCount();
    }

    // -------- SELECTION FUNCTIONS --------
    window.selectAllItems = function() {
      document.querySelectorAll('.cart-item-checkbox').forEach(cb => cb.checked = true);
      updateSelectedCount();
    };

    window.deselectAllItems = function() {
      document.querySelectorAll('.cart-item-checkbox').forEach(cb => cb.checked = false);
      updateSelectedCount();
    };

    window.updateSelectedCount = function() {
      const checkboxes = document.querySelectorAll('.cart-item-checkbox');
      const checked = document.querySelectorAll('.cart-item-checkbox:checked');
      document.getElementById('selectedCount').textContent = checked.length + ' selected';
      document.getElementById('bulkCount').textContent = checked.length;
    };

    // -------- BULK BUY --------
    window.bulkBuy = function() {
      const checkedBoxes = document.querySelectorAll('.cart-item-checkbox:checked');
      if (checkedBoxes.length === 0) {
        showToast('⚠️ Please select at least one item to buy.');
        return;
      }

      const selectedIndices = [];
      checkedBoxes.forEach(cb => {
        selectedIndices.push(parseInt(cb.dataset.index, 10));
      });

      openBulkBuyModal(selectedIndices);
    };

    // -------- BUY MODAL LOGIC --------
    let buyModalInstance = null;
    let currentBuyIndex = -1;
    let currentBulkIndices = [];

    function openBuyModal(index) {
      currentBuyIndex = index;
      currentBulkIndices = [];
      document.getElementById('buyMode').value = 'single';
      document.getElementById('bulkItemsList').style.display = 'none';

      const item = cart[index];
      document.getElementById('buyItemIndex').value = index;

      const colorSelect = document.getElementById('buyColor');
      const sizeSelect = document.getElementById('buySize');

      colorSelect.value = '';
      sizeSelect.value = '';

      if (item.selectedColor) {
        const colorOption = Array.from(colorSelect.options).find(opt => opt.value === item.selectedColor);
        if (colorOption) colorSelect.value = item.selectedColor;
      }

      if (item.selectedSize) {
        const sizeOption = Array.from(sizeSelect.options).find(opt => opt.value === item.selectedSize);
        if (sizeOption) sizeSelect.value = item.selectedSize;
      }

      // Clear customer fields
      document.getElementById('customerName').value = '';
      document.getElementById('customerEmail').value = '';
      document.getElementById('customerPhone').value = '';
      document.getElementById('buyService').value = '';

      if (!buyModalInstance) {
        const modalEl = document.getElementById('buyModal');
        buyModalInstance = new bootstrap.Modal(modalEl);
      }
      buyModalInstance.show();
    }

    function openBulkBuyModal(indices) {
      currentBulkIndices = indices;
      currentBuyIndex = -1;
      document.getElementById('buyMode').value = 'bulk';
      document.getElementById('buyItemIndex').value = '';
      document.getElementById('bulkItemsList').style.display = 'block';

      // Build items list
      const ul = document.getElementById('bulkItemsUl');
      ul.innerHTML = '';
      let total = 0;
      indices.forEach(idx => {
        const item = cart[idx];
        const li = document.createElement('li');
        li.textContent = `📦 ${item.name} - P${item.price} (${item.selectedColor || 'N/A'}, ${item.selectedSize || 'N/A'})`;
        ul.appendChild(li);
        total += item.price;
      });
      document.getElementById('bulkTotalPrice').textContent = total.toFixed(2);

      // Clear fields
      document.getElementById('customerName').value = '';
      document.getElementById('customerEmail').value = '';
      document.getElementById('customerPhone').value = '';
      document.getElementById('buyColor').value = '';
      document.getElementById('buySize').value = '';
      document.getElementById('buyService').value = '';

      if (!buyModalInstance) {
        const modalEl = document.getElementById('buyModal');
        buyModalInstance = new bootstrap.Modal(modalEl);
      }
      buyModalInstance.show();
    }

    // -------- CONFIRM BUY --------
    document.getElementById('confirmBuyBtn').addEventListener('click', async function() {
      const mode = document.getElementById('buyMode').value;

      const customerName = document.getElementById('customerName').value.trim();
      const customerEmail = document.getElementById('customerEmail').value.trim();
      const customerPhone = document.getElementById('customerPhone').value.trim();
      const color = document.getElementById('buyColor').value;
      const size = document.getElementById('buySize').value;
      const service = document.getElementById('buyService').value;

      // Validate customer details
      if (!customerName || !customerEmail || !customerPhone) {
        showToast('⚠️ Please enter your contact details.');
        return;
      }

      if (!customerEmail.includes('@')) {
        showToast('⚠️ Please enter a valid email address.');
        return;
      }

      if (!service) {
        showToast('⚠️ Please select a service method.');
        return;
      }

      const confirmBtn = document.getElementById('confirmBuyBtn');
      confirmBtn.disabled = true;
      confirmBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Placing order...';

      try {
        let orders = [];

        if (mode === 'single' && currentBuyIndex >= 0) {
          // Single item
          const item = cart[currentBuyIndex];
          if (!color || !size) {
            showToast('⚠️ Please select color and size.');
            confirmBtn.disabled = false;
            confirmBtn.innerHTML = '✅ Place Order';
            return;
          }
          orders.push({
            customer_name: customerName,
            customer_email: customerEmail,
            customer_phone: customerPhone,
            product_name: item.name,
            price: item.price,
            color: color,
            size: size,
            service_method: service,
            status: 'pending',
            ordered_at: new Date().toISOString()
          });
        } else if (mode === 'bulk' && currentBulkIndices.length > 0) {
          // Bulk items - use same color/size for all (or you can customize per item)
          if (!color || !size) {
            showToast('⚠️ Please select color and size for all items.');
            confirmBtn.disabled = false;
            confirmBtn.innerHTML = '✅ Place Order';
            return;
          }
          currentBulkIndices.forEach(idx => {
            const item = cart[idx];
            orders.push({
              customer_name: customerName,
              customer_email: customerEmail,
              customer_phone: customerPhone,
              product_name: item.name,
              price: item.price,
              color: color,
              size: size,
              service_method: service,
              status: 'pending',
              ordered_at: new Date().toISOString()
            });
          });
        } else {
          showToast('❌ Error: No items selected.');
          confirmBtn.disabled = false;
          confirmBtn.innerHTML = '✅ Place Order';
          return;
        }

        // Save all orders to Supabase
        const results = await saveMultipleOrdersToSupabase(orders);
        const successCount = results.filter(r => r.success).length;

        if (successCount > 0) {
          // Remove purchased items from cart
          let indicesToRemove = [];
          if (mode === 'single' && currentBuyIndex >= 0) {
            indicesToRemove.push(currentBuyIndex);
          } else if (mode === 'bulk') {
            indicesToRemove = currentBulkIndices.sort((a, b) => b - a);
          }

          // Remove from cart (highest index first)
          indicesToRemove.forEach(idx => {
            cart.splice(idx, 1);
          });

          saveAndRender();
          showToast(`✅ ${successCount} order(s) placed successfully! Check your email.`);

          if (buyModalInstance) {
            buyModalInstance.hide();
          }
        } else {
          showToast('❌ Failed to place orders. Please try again.');
        }

      } catch (err) {
        console.error('Order error:', err);
        showToast('❌ Error placing order. Please try again.');
      } finally {
        confirmBtn.disabled = false;
        confirmBtn.innerHTML = '✅ Place Order';
      }
    });

    // Close modal on cancel
    document.querySelector('#buyModal .btn-secondary').addEventListener('click', function() {
      if (buyModalInstance) {
        buyModalInstance.hide();
      }
    });

    document.querySelector('#buyModal .btn-close').addEventListener('click', function() {
      if (buyModalInstance) {
        buyModalInstance.hide();
      }
    });

    // -------- INITIAL RENDER --------
    renderCart();

    // Expose functions globally
    window.showToast = showToast;
    window.updateSelectedCount = updateSelectedCount;
  </script>

</body>

</html>
