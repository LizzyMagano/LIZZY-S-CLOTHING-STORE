<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - Lizzy's Clothing Store</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f4f4f9;
    }
    .card-img-top {
      height: 220px;
      object-fit: cover;
      background-color: #e9ecef;
    }
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
    }
    /* Buy Now form modal tweaks */
    .modal-content {
      border-radius: 1rem;
    }
    .modal-header {
      background-color: #212529;
      color: white;
      border-top-left-radius: 1rem;
      border-top-right-radius: 1rem;
    }
    .modal-header .btn-close {
      filter: brightness(0) invert(1);
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Lizzy's Clothing Store</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link active" href="shop.html">Shop</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
          <li class="nav-item"><a class="nav-link" href="service.html">Service</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="feedback.html">Feedback</a></li>
        </ul>
        <button id="toggleCart" class="btn btn-success ms-3" onclick="window.location.href='cart.html'">View Cart (0)</button>
      </div>
    </div>
  </nav>

  <!-- Shop Grid -->
  <div class="container my-4">
    <div id="shop" class="row"></div>
  </div>

  <!-- Buy Now Modal (color, size, service) -->
  <div class="modal fade" id="buyNowModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">🛒 Buy Now</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div id="buyNowProductInfo" class="mb-3 fw-bold">Product: </div>
          <form id="buyNowForm">
            <div class="mb-3">
              <label for="buyColor" class="form-label">Color</label>
              <select id="buyColor" class="form-select" required>
                <option value="">Select color...</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="buySize" class="form-label">Size</label>
              <select id="buySize" class="form-select" required>
                <option value="">Select size...</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="buyService" class="form-label">Service Method</label>
              <select id="buyService" class="form-select" required>
                <option value="">Choose service...</option>
                <option value="Delivery">🚚 Delivery</option>
                <option value="Pickup">🏪 Pickup</option>
                <option value="Express">⚡ Express</option>
              </select>
            </div>
            <input type="hidden" id="buyProductId" value="">
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" id="confirmBuyBtn" class="btn btn-success">✅ Place Order</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container">
    <div id="orderToast" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body" id="toastMessage">✅ Order placed successfully!</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS + Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // -------- PRODUCT DATA --------
    const products = [
      { id: 1, name: "Evening dress", price: 1000, image: "gown.jpg", colors: ["Red", "Black", "Blue"], sizes: ["S", "M", "L"] },
      { id: 2, name: "Vintage dress", price: 230, image: "dress.jpg", colors: ["Pink", "White"], sizes: ["M", "L"] },
      { id: 3, name: "Lady shorts", price: 100, image: "lady shorts.jpg", colors: ["Yellow", "Green"], sizes: ["S", "M"] },
      { id: 4, name: "Plain T-shirt", price: 80, image: "tshirt.jpg", colors: ["White", "Gray", "Black"], sizes: ["S", "M", "L", "XL"] },
      { id: 5, name: "Vintage skirt", price: 500, image: "skirt.jpg", colors: ["Blue", "Black"], sizes: ["M", "L"] },
      { id: 6, name: "Lady suit", price: 1200, image: "lady suit.jpg", colors: ["Blue", "Gray"], sizes: ["L", "XL"] },
      { id: 7, name: "Men suits", price: 900, image: "men suit.jpg", colors: ["Black", "Gray"], sizes: ["M", "L", "XL"] },
      { id: 8, name: "Men shorts", price: 300, image: "men shorts.jpg", colors: ["Black", "Blue"], sizes: ["S", "M", "L"] }
    ];

    // -------- CART (localStorage) --------
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    function updateCartButton() {
      document.getElementById("toggleCart").innerText = `View Cart (${cart.length})`;
    }

    // -------- ADD TO CART --------
    function addToCart(id) {
      const product = products.find((p) => p.id === id);
      const selectedColor = document.getElementById(`color-${id}`).value;
      const selectedSize = document.getElementById(`size-${id}`).value;
      cart.push({ 
        ...product, 
        selectedColor, 
        selectedSize,
        cartId: Date.now() + Math.random() 
      });
      localStorage.setItem("cart", JSON.stringify(cart));
      updateCartButton();
      showToast(`🛒 "${product.name}" added to cart!`);
    }

    // -------- TOAST HELPER --------
    function showToast(message) {
      const toastEl = document.getElementById('orderToast');
      const msgEl = document.getElementById('toastMessage');
      msgEl.textContent = message;
      const toast = new bootstrap.Toast(toastEl, { delay: 2500 });
      toast.show();
    }

    // -------- RENDER PRODUCTS (with BUY NOW button) --------
    function renderProducts() {
      const shop = document.getElementById("shop");
      shop.innerHTML = "";
      products.forEach((product) => {
        const colorOptions = product.colors.map(color => `<option value="${color}">${color}</option>`).join("");
        const sizeOptions = product.sizes.map(size => `<option value="${size}">${size}</option>`).join("");

        const card = document.createElement("div");
        card.className = "col-md-4 mb-4";
        card.innerHTML = `
          <div class="card shadow-sm h-100">
            <img src="${product.image}" class="card-img-top" alt="${product.name}" onerror="this.src='https://via.placeholder.com/300x220?text=No+Image'">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title">${product.name}</h5>
              <p class="card-text">Price: P${product.price}</p>
              <div class="mb-2">
                <label class="form-label">Color</label>
                <select id="color-${product.id}" class="form-select">${colorOptions}</select>
              </div>
              <div class="mb-2">
                <label class="form-label">Size</label>
                <select id="size-${product.id}" class="form-select">${sizeOptions}</select>
              </div>
              <div class="mt-auto d-grid gap-2">
                <button class="btn btn-primary" onclick="addToCart(${product.id})">Add to Cart</button>
                <!-- BUY NOW button: opens modal -->
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#buyNowModal" onclick="prepareBuyNow(${product.id})">Buy Now</button>
              </div>
            </div>
          </div>
        `;
        shop.appendChild(card);
      });
    }

    // -------- PREPARE BUY NOW MODAL with product data --------
    function prepareBuyNow(productId) {
      const product = products.find(p => p.id === productId);
      if (!product) return;

      // Set product info
      document.getElementById('buyNowProductInfo').innerHTML = `📦 <strong>${product.name}</strong> — P${product.price}`;
      document.getElementById('buyProductId').value = productId;

      // Populate color dropdown
      const colorSelect = document.getElementById('buyColor');
      colorSelect.innerHTML = `<option value="">Select color...</option>`;
      product.colors.forEach(color => {
        colorSelect.innerHTML += `<option value="${color}">${color}</option>`;
      });

      // Populate size dropdown
      const sizeSelect = document.getElementById('buySize');
      sizeSelect.innerHTML = `<option value="">Select size...</option>`;
      product.sizes.forEach(size => {
        sizeSelect.innerHTML += `<option value="${size}">${size}</option>`;
      });

      // Reset service dropdown to default
      document.getElementById('buyService').value = '';
    }

    // -------- CONFIRM BUY (from modal) -> WhatsApp + toast --------
    function confirmBuy() {
      const productId = document.getElementById('buyProductId').value;
      const product = products.find(p => p.id == productId);
      if (!product) {
        showToast('❌ Product not found.');
        return;
      }

      const color = document.getElementById('buyColor').value;
      const size = document.getElementById('buySize').value;
      const service = document.getElementById('buyService').value;

      if (!color || !size || !service) {
        showToast('⚠️ Please select color, size and service method.');
        return;
      }

      // WhatsApp number (without +)
      const phone = "78549270";  // <-- your number

      // Build message
      const message = `🛍️ *New Order!*%0A%0A` +
                      `📦 Item: ${product.name}%0A` +
                      `💰 Price: P${product.price}%0A` +
                      `🎨 Color: ${color}%0A` +
                      `📏 Size: ${size}%0A` +
                      `📬 Service: ${service}%0A` +
                      `%0AThank you for shopping with Lizzy's Clothing Store!`;

      // Open WhatsApp (new tab)
      window.open(`https://wa.me/${phone}?text=${message}`, '_blank');

      // Show toast "Order placed"
      showToast(`✅ Order placed for "${product.name}"! Check WhatsApp.`);

      // Dismiss modal
      const modal = bootstrap.Modal.getInstance(document.getElementById('buyNowModal'));
      if (modal) modal.hide();

      // (Optional) add to cart as well? not needed, but we keep it separate.
    }

    // -------- INITIAL RENDER --------
    renderProducts();
    updateCartButton();

    // -------- ATTACH EVENT TO CONFIRM BUTTON --------
    document.getElementById('confirmBuyBtn').addEventListener('click', confirmBuy);

    // Also expose helper for cart.html if needed
    window.showToast = showToast;
    window.buyNowFromCart = function(item, color, size, serviceMethod) {
      // For cart.html compatibility: send WhatsApp from cart
      const phone = "78549270";
      const message = `🛍️ *New Order!*%0A%0A` +
                      `📦 Item: ${item.name}%0A` +
                      `💰 Price: P${item.price}%0A` +
                      `🎨 Color: ${color}%0A` +
                      `📏 Size: ${size}%0A` +
                      `📬 Service: ${serviceMethod}%0A` +
                      `%0AThank you for shopping with Lizzy's Clothing Store!`;
      window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
      showToast(`✅ Order placed for "${item.name}"! Check WhatsApp.`);
    };
  </script>
</body>
          </html>
