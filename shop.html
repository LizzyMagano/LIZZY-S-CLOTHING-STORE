<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop · Lizzy's Clothing Store</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    body {
      background: #f4f6fa;
    }
    .card-img-top {
      height: 220px;
      object-fit: cover;
      background: #e9ecef;
      width: 100%;
    }
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
    }
    .modal-content {
      border-radius: 1.25rem;
    }
    .modal-header {
      background: #1e293b;
      color: white;
      border-radius: 1.25rem 1.25rem 0 0;
    }
    .modal-header .btn-close {
      filter: brightness(0) invert(1);
    }
    .btn-primary {
      background: #2563eb;
      border: none;
    }
    .btn-primary:hover {
      background: #1d4ed8;
    }
    .btn-success {
      background: #16a34a;
      border: none;
    }
    .btn-success:hover {
      background: #15803d;
    }
    .card {
      height: 100%;
    }
    .card-body {
      flex: 1 1 auto;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Lizzy's Clothing Store</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link active" href="shop.html">Shop</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
          <li class="nav-item"><a class="nav-link" href="service.html">Service</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="feedback.html">Feedback</a></li>
        </ul>
        <button id="toggleCart" class="btn btn-success ms-3" onclick="window.location.href='cart.html'">🛒 Cart (0)</button>
      </div>
    </div>
  </nav>

  <!-- SHOP GRID -->
  <div class="container my-4">
    <h3><i class="fas fa-tshirt me-2"></i>Our Collection</h3>
    <div id="shop" class="row"></div>
  </div>

  <!-- BUY NOW MODAL -->
  <div class="modal fade" id="buyNowModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="fas fa-shopping-bag me-2"></i>Buy Now</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="buyNowProductInfo" class="fw-bold mb-3 p-2 bg-light rounded">Product: </div>
          <form id="buyNowForm">
            <div class="mb-3">
              <label for="customerName" class="form-label">Your Name</label>
              <input type="text" id="customerName" class="form-control" placeholder="Enter your name" required>
            </div>
            <div class="mb-3">
              <label for="customerEmail" class="form-label">Your Email</label>
              <input type="email" id="customerEmail" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="mb-3">
              <label for="customerPhone" class="form-label">Phone Number</label>
              <input type="tel" id="customerPhone" class="form-control" placeholder="+267 78 549 270" required>
            </div>
            <div class="mb-3">
              <label for="buyColor" class="form-label">Color</label>
              <select id="buyColor" class="form-select" required>
                <option value="">Select color...</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="buySize" class="form-label">Size</label>
              <select id="buySize" class="form-select" required>
                <option value="">Select size...</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="buyService" class="form-label">Service Method</label>
              <select id="buyService" class="form-select" required>
                <option value="">Choose service...</option>
                <option value="Delivery">🚚 Delivery</option>
                <option value="Pickup">🏪 Pickup</option>
                <option value="Express">⚡ Express</option>
              </select>
            </div>
            <input type="hidden" id="buyProductId" value="" />
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" id="confirmBuyBtn" class="btn btn-success"><i class="fas fa-check-circle me-1"></i>Place Order</button>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast-container">
    <div id="orderToast" class="toast align-items-center text-white bg-success border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body" id="toastMessage">✅ Order placed!</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- ========== SUPABASE + EMAILJS ========== -->
  <script type="module">
    // ============================================================
    //  🔧  SUPABASE CONFIGURATION
    // ============================================================
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
    import emailjs from "https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js";

    const SUPABASE_URL = "https://wmebpsheblrkuvygguae.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_rUkBj0Th3x6ZXGbPkLGsHQ_f5WG3jB_";
    const ORDERS_TABLE = 'shop_orders';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ============================================================
    //  🔧  EMAILJS CONFIGURATION
    // ============================================================
    emailjs.init('p1SkBpAIthT5H_oqV');

    const EMAILJS_SERVICE_ID = 'service_0hxmvck';
    const EMAILJS_TEMPLATE_ID = 'template_us3d5rc';

    // ============================================================
    //  📦  PRODUCT DATA
    // ============================================================
    const products = [
      { id: 1, name: "Evening dress", price: 1000, image: "gown.jpg", colors: ["Red", "Black", "Blue"], sizes: ["S", "M", "L"] },
      { id: 2, name: "Vintage dress", price: 230, image: "dress.jpg", colors: ["Pink", "White"], sizes: ["M", "L"] },
      { id: 3, name: "Lady shorts", price: 100, image: "lady shorts.jpg", colors: ["Yellow", "Green"], sizes: ["S", "M"] },
      { id: 4, name: "Plain T-shirt", price: 80, image: "tshirt.jpg", colors: ["White", "Gray", "Black"], sizes: ["S", "M", "L", "XL"] },
      { id: 5, name: "Vintage skirt", price: 500, image: "skirt.jpg", colors: ["Blue", "Black"], sizes: ["M", "L"] },
      { id: 6, name: "Lady suit", price: 1200, image: "lady suit.jpg", colors: ["Blue", "Gray"], sizes: ["L", "XL"] },
      { id: 7, name: "Men suits", price: 900, image: "men suit.jpg", colors: ["Black", "Gray"], sizes: ["M", "L", "XL"] },
      { id: 8, name: "Men shorts", price: 300, image: "men shorts.jpg", colors: ["Black", "Blue"], sizes: ["S", "M", "L"] }
    ];

    // ============================================================
    //  🛒  CART FUNCTIONS
    // ============================================================
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    function updateCartButton() {
      document.getElementById("toggleCart").innerHTML = `🛒 Cart (${cart.length})`;
    }

    function showToast(msg) {
      const toastEl = document.getElementById('orderToast');
      document.getElementById('toastMessage').textContent = msg;
      const toast = new bootstrap.Toast(toastEl, { delay: 2800 });
      toast.show();
    }

    function addToCart(id) {
      const product = products.find(p => p.id === id);
      const color = document.getElementById(`color-${id}`).value;
      const size = document.getElementById(`size-${id}`).value;
      cart.push({ ...product, selectedColor: color, selectedSize: size, cartId: Date.now() + Math.random() });
      localStorage.setItem("cart", JSON.stringify(cart));
      updateCartButton();
      showToast(`🛒 "${product.name}" added to cart!`);
    }

    // ============================================================
    //  📧  SEND ORDER NOTIFICATION VIA EMAILJS
    // ============================================================
    async function sendOrderNotification(orderData) {
      try {
        const orderDate = new Date(orderData.ordered_at);
        const formattedDate = orderDate.toLocaleDateString('en-BW', {
          year: 'numeric',
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });

        const templateParams = {
          order_id: orderData.id,
          customer_name: orderData.customer_name,
          customer_email: orderData.customer_email,
          product_name: orderData.product_name,
          price: orderData.price.toFixed(2),
          color: orderData.color,
          size: orderData.size,
          service_method: orderData.service_method,
          ordered_at: formattedDate,
          status: orderData.status,
          store_name: "Lizzy's Clothing Store",
          store_address: "Plot 123, Gaborone, Botswana",
          store_phone: "+267 78549270",
          store_website: window.location.origin
        };

        console.log('📧 Sending email with params:', templateParams);

        const response = await emailjs.send(
          EMAILJS_SERVICE_ID,
          EMAILJS_TEMPLATE_ID,
          templateParams
        );

        console.log('✅ Order notification sent!', response);
        return { success: true, response };

      } catch (error) {
        console.error('❌ Error sending notification:', error);
        return { success: false, error };
      }
    }

    // ============================================================
    //  📥  SAVE ORDER TO SUPABASE
    // ============================================================
    async function saveOrderToSupabase(orderData) {
      try {
        const { data, error } = await supabase
          .from(ORDERS_TABLE)
          .insert([orderData])
          .select();

        if (error) throw error;
        return { success: true, data };
      } catch (error) {
        console.error('❌ Supabase insert failed:', error);
        return { success: false, error };
      }
    }

    // ============================================================
    //  🛍️  CONFIRM BUY - PLACE ORDER
    // ============================================================
    async function confirmBuy() {
      const productId = document.getElementById('buyProductId').value;
      const product = products.find(p => p.id == productId);
      if (!product) { showToast('❌ Product not found.'); return; }

      const customerName = document.getElementById('customerName').value.trim();
      const customerEmail = document.getElementById('customerEmail').value.trim();
      const customerPhone = document.getElementById('customerPhone').value.trim();
      const color = document.getElementById('buyColor').value;
      const size = document.getElementById('buySize').value;
      const service = document.getElementById('buyService').value;

      if (!customerName || !customerEmail || !customerPhone) {
        showToast('⚠️ Please enter your contact details.');
        return;
      }

      if (!customerEmail.includes('@')) {
        showToast('⚠️ Please enter a valid email address.');
        return;
      }

      if (!color || !size || !service) {
        showToast('⚠️ Please select color, size and service.');
        return;
      }

      const confirmBtn = document.getElementById('confirmBuyBtn');
      confirmBtn.disabled = true;
      confirmBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Placing order...';

      try {
        const orderPayload = {
          customer_name: customerName,
          customer_email: customerEmail,
          customer_phone: customerPhone,
          product_name: product.name,
          price: product.price,
          color: color,
          size: size,
          service_method: service,
          status: 'pending',
          ordered_at: new Date().toISOString()
        };

        const result = await saveOrderToSupabase(orderPayload);

        if (!result.success) {
          showToast('❌ Failed to save order. Please try again.');
          confirmBtn.disabled = false;
          confirmBtn.innerHTML = '<i class="fas fa-check-circle me-1"></i>Place Order';
          return;
        }

        const savedOrder = result.data[0];
        console.log('✅ Order saved to Supabase with ID:', savedOrder.id);

        const emailResult = await sendOrderNotification(savedOrder);

        if (emailResult.success) {
          showToast(`✅ Order placed for "${product.name}"! Check your email.`);
        } else {
          showToast(`✅ Order placed for "${product.name}"! We'll notify you when ready.`);
        }

        const modal = bootstrap.Modal.getInstance(document.getElementById('buyNowModal'));
        if (modal) modal.hide();
        document.getElementById('buyNowForm').reset();

      } catch (error) {
        console.error('Error placing order:', error);
        showToast('❌ Error placing order. Please try again.');
      } finally {
        confirmBtn.disabled = false;
        confirmBtn.innerHTML = '<i class="fas fa-check-circle me-1"></i>Place Order';
      }
    }

    // ============================================================
    //  🛠️  PREPARE BUY NOW MODAL
    // ============================================================
    function prepareBuyNow(productId) {
      const product = products.find(p => p.id === productId);
      if (!product) return;
      document.getElementById('buyNowProductInfo').innerHTML = `📦 <strong>${product.name}</strong> — P${product.price}`;
      document.getElementById('buyProductId').value = productId;

      const colorSelect = document.getElementById('buyColor');
      colorSelect.innerHTML = `<option value="">Select color...</option>`;
      product.colors.forEach(c => colorSelect.innerHTML += `<option value="${c}">${c}</option>`);

      const sizeSelect = document.getElementById('buySize');
      sizeSelect.innerHTML = `<option value="">Select size...</option>`;
      product.sizes.forEach(s => sizeSelect.innerHTML += `<option value="${s}">${s}</option>`);

      document.getElementById('buyService').value = '';
    }

    // ============================================================
    //  🎨  RENDER PRODUCTS
    // ============================================================
    function renderProducts() {
      const shop = document.getElementById('shop');
      shop.innerHTML = '';
      products.forEach(p => {
        const colorOpts = p.colors.map(c => `<option value="${c}">${c}</option>`).join('');
        const sizeOpts = p.sizes.map(s => `<option value="${s}">${s}</option>`).join('');
        const card = document.createElement('div');
        card.className = 'col-md-4 col-lg-3 mb-4';
        card.innerHTML = `
          <div class="card shadow-sm h-100">
            <img src="${p.image}" class="card-img-top" alt="${p.name}" onerror="this.src='https://via.placeholder.com/300x220?text=No+Image'">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title">${p.name}</h5>
              <p class="card-text">Price: P${p.price}</p>
              <div class="mb-2">
                <label class="form-label">Color</label>
                <select id="color-${p.id}" class="form-select">${colorOpts}</select>
              </div>
              <div class="mb-2">
                <label class="form-label">Size</label>
                <select id="size-${p.id}" class="form-select">${sizeOpts}</select>
              </div>
              <div class="mt-auto d-grid gap-2">
                <button class="btn btn-primary" onclick="addToCart(${p.id})"><i class="fas fa-cart-plus me-1"></i>Add to Cart</button>
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#buyNowModal" onclick="prepareBuyNow(${p.id})"><i class="fas fa-bolt me-1"></i>Buy Now</button>
              </div>
            </div>
          </div>
        `;
        shop.appendChild(card);
      });
    }

    // ============================================================
    //  🚀  INIT
    // ============================================================
    renderProducts();
    updateCartButton();

    document.getElementById('confirmBuyBtn').addEventListener('click', confirmBuy);

    window.addToCart = addToCart;
    window.prepareBuyNow = prepareBuyNow;
    window.confirmBuy = confirmBuy;
    window.showToast = showToast;
  </script>
</body>
</html>
                                                                                   </html>
