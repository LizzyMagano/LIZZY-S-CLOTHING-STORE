<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop · Lizzy's Clothing Store</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    body {
      background: #f4f6fa;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    .card-img-top {
      height: 220px;
      object-fit: cover;
      background: #e9ecef;
      width: 100%;
    }
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
    }
    .modal-content {
      border-radius: 1.25rem;
    }
    .modal-header {
      background: #1e293b;
      color: white;
      border-radius: 1.25rem 1.25rem 0 0;
    }
    .modal-header .btn-close {
      filter: brightness(0) invert(1);
    }
    .btn-primary {
      background: #2563eb;
      border: none;
    }
    .btn-primary:hover {
      background: #1d4ed8;
    }
    .btn-success {
      background: #16a34a;
      border: none;
    }
    .btn-success:hover {
      background: #15803d;
    }
    .card {
      height: 100%;
      transition: transform 0.2s ease;
    }
    .card:hover {
      transform: translateY(-4px);
    }
    .card-body {
      flex: 1 1 auto;
    }
    .form-control:focus,
    .form-select:focus {
      border-color: #25D366;
      box-shadow: 0 0 0 0.2rem rgba(37, 211, 102, 0.25);
    }
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Lizzy's Clothing Store</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link active" href="shop.html">Shop</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
          <li class="nav-item"><a class="nav-link" href="service.html">Service</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="feedback.html">Feedback</a></li>
        </ul>
        <button id="toggleCart" class="btn btn-success ms-3" onclick="window.location.href='cart.html'">
          <i class="fas fa-shopping-cart me-1"></i> Cart (<span id="cartCount">0</span>)
        </button>
      </div>
    </div>
  </nav>

  <!-- SHOP GRID -->
  <div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3><i class="fas fa-tshirt me-2"></i>Our Collection</h3>
      <span class="badge bg-secondary"><i class="fas fa-box me-1"></i> <span id="productCount">0</span> products</span>
    </div>
    <div id="shop" class="row"></div>
  </div>

  <!-- BUY NOW MODAL -->
  <div class="modal fade" id="buyNowModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="fas fa-shopping-bag me-2"></i>Place Order</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="buyNowProductInfo" class="fw-bold mb-3 p-3 bg-light rounded">
            <i class="fas fa-tag me-2"></i> Product: <span id="productNameDisplay"></span> — P<span id="productPriceDisplay"></span>
          </div>
          <form id="buyNowForm" onsubmit="return false;">
            <div class="mb-3">
              <label for="customerName" class="form-label fw-semibold">Your Name <span class="text-danger">*</span></label>
              <input type="text" id="customerName" class="form-control" placeholder="Enter your full name" required>
            </div>
            <div class="mb-3">
              <label for="customerEmail" class="form-label fw-semibold">Email Address <span class="text-danger">*</span></label>
              <input type="email" id="customerEmail" class="form-control" placeholder="you@example.com" required>
              <div class="form-text">We'll send order confirmation here.</div>
            </div>
            <div class="mb-3">
              <label for="customerPhone" class="form-label fw-semibold">Phone Number <span class="text-danger">*</span></label>
              <input type="tel" id="customerPhone" class="form-control" placeholder="+267 78 549 270" required>
            </div>
            <hr>
            <div class="mb-3">
              <label for="buyColor" class="form-label fw-semibold">Color <span class="text-danger">*</span></label>
              <select id="buyColor" class="form-select" required>
                <option value="">Select color...</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="buySize" class="form-label fw-semibold">Size <span class="text-danger">*</span></label>
              <select id="buySize" class="form-select" required>
                <option value="">Select size...</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="buyService" class="form-label fw-semibold">Service Method <span class="text-danger">*</span></label>
              <select id="buyService" class="form-select" required>
                <option value="">Choose service...</option>
                <option value="Delivery">🚚 Delivery</option>
                <option value="Pickup">🏪 Pickup</option>
                <option value="Express">⚡ Express</option>
              </select>
            </div>
            <input type="hidden" id="buyProductId" value="" />
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" id="confirmBuyBtn" class="btn btn-success" onclick="confirmBuy()">
            <i class="fas fa-check-circle me-1"></i> Place Order
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ORDER CONFIRMATION TOAST -->
  <div class="toast-container">
    <div id="orderToast" class="toast align-items-center text-white border-0" role="alert" style="background: #1e293b;">
      <div class="d-flex">
        <div class="toast-body" id="toastMessage">
          <i class="fas fa-check-circle text-success me-2"></i> Order placed successfully!
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
  </script>

  <!-- ========================================== -->
  <!-- SUPABASE + EMAILJS - SIMPLE JAVASCRIPT     -->
  <!-- ========================================== -->
  <script>
    // ============================================================
    //  🔧  SUPABASE CONFIGURATION
    // ============================================================
    var SUPABASE_URL = "https://wmebpsheblrkuvygguae.supabase.co";
    var SUPABASE_ANON_KEY = "sb_publishable_rUkBj0Th3x6ZXGbPkLGsHQ_f5WG3jB_";
    var ORDERS_TABLE = 'shop_orders';

    // ============================================================
    //  🔧  EMAILJS CONFIGURATION
    // ============================================================
    var EMAILJS_PUBLIC_KEY = 'p1SkBpAIthT5H_oqV';
    var EMAILJS_SERVICE_ID = 'service_0hxmvck';
    var EMAILJS_TEMPLATE_ID = 'template_us3d5rc';

    // ============================================================
    //  📦  PRODUCT DATA
    // ============================================================
    var products = [
      { id: 1, name: "Evening dress", price: 1000, image: "gown.jpg", colors: ["Red", "Black", "Blue"], sizes: ["S", "M", "L"] },
      { id: 2, name: "Vintage dress", price: 230, image: "dress.jpg", colors: ["Pink", "White"], sizes: ["M", "L"] },
      { id: 3, name: "Lady shorts", price: 100, image: "lady shorts.jpg", colors: ["Yellow", "Green"], sizes: ["S", "M"] },
      { id: 4, name: "Plain T-shirt", price: 80, image: "tshirt.jpg", colors: ["White", "Gray", "Black"], sizes: ["S", "M", "L", "XL"] },
      { id: 5, name: "Vintage skirt", price: 500, image: "skirt.jpg", colors: ["Blue", "Black"], sizes: ["M", "L"] },
      { id: 6, name: "Lady suit", price: 1200, image: "lady suit.jpg", colors: ["Blue", "Gray"], sizes: ["L", "XL"] },
      { id: 7, name: "Men suits", price: 900, image: "men suit.jpg", colors: ["Black", "Gray"], sizes: ["M", "L", "XL"] },
      { id: 8, name: "Men shorts", price: 300, image: "men shorts.jpg", colors: ["Black", "Blue"], sizes: ["S", "M", "L"] }
    ];

    // ============================================================
    //  🛒  CART FUNCTIONS
    // ============================================================
    var cart = JSON.parse(localStorage.getItem("cart")) || [];

    function updateCartButton() {
      var count = cart.length;
      document.getElementById('cartCount').textContent = count;
    }

    function showToast(msg, isError) {
      var toastEl = document.getElementById('orderToast');
      var toastBody = document.getElementById('toastMessage');
      toastBody.innerHTML = msg;
      toastEl.style.background = isError ? '#dc3545' : '#1e293b';
      var toast = new bootstrap.Toast(toastEl, { delay: 3500 });
      toast.show();
    }

    function addToCart(id) {
      var product = null;
      for (var i = 0; i < products.length; i++) {
        if (products[i].id === id) {
          product = products[i];
          break;
        }
      }
      if (!product) return;

      var color = document.getElementById('color-' + id).value;
      var size = document.getElementById('size-' + id).value;

      if (!color || !size) {
        showToast('⚠️ Please select a color and size first.', true);
        return;
      }

      var cartItem = {
        id: product.id,
        name: product.name,
        price: product.price,
        image: product.image,
        colors: product.colors,
        sizes: product.sizes,
        selectedColor: color,
        selectedSize: size,
        cartId: Date.now() + Math.random()
      };
      cart.push(cartItem);
      localStorage.setItem("cart", JSON.stringify(cart));
      updateCartButton();
      showToast('🛒 "' + product.name + '" added to cart!');
    }

    // ============================================================
    //  📧  SEND ORDER NOTIFICATION VIA EMAILJS
    // ============================================================
    function sendOrderNotification(orderData) {
      // Load EmailJS
      var script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
      script.onload = function() {
        emailjs.init(EMAILJS_PUBLIC_KEY);

        var orderDate = new Date(orderData.ordered_at);
        var formattedDate = orderDate.toLocaleDateString('en-BW', {
          year: 'numeric',
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });

        var templateParams = {
          order_id: orderData.id,
          customer_name: orderData.customer_name,
          customer_email: orderData.customer_email,
          product_name: orderData.product_name,
          price: orderData.price.toFixed(2),
          color: orderData.color,
          size: orderData.size,
          service_method: orderData.service_method,
          ordered_at: formattedDate,
          status: orderData.status,
          store_name: "Lizzy's Clothing Store",
          store_address: "Plot 123, Gaborone, Botswana",
          store_phone: "+267 78549270",
          store_website: window.location.origin
        };

        emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams)
          .then(function(response) {
            console.log('✅ Order notification sent!', response);
          })
          .catch(function(error) {
            console.error('❌ Error sending notification:', error);
          });
      };
      document.head.appendChild(script);
    }

    // ============================================================
    //  📥  SAVE ORDER TO SUPABASE
    // ============================================================
    function saveOrderToSupabase(orderData, callback) {
      var url = SUPABASE_URL + '/rest/v1/' + ORDERS_TABLE;

      var xhr = new XMLHttpRequest();
      xhr.open('POST', url, true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('apikey', SUPABASE_ANON_KEY);
      xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_ANON_KEY);
      xhr.setRequestHeader('Prefer', 'return=representation');

      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 201) {
            var data = JSON.parse(xhr.responseText);
            callback({ success: true, data: data });
          } else {
            console.error('Supabase error:', xhr.status, xhr.responseText);
            callback({ success: false, error: xhr.responseText });
          }
        }
      };

      xhr.send(JSON.stringify(orderData));
    }

    // ============================================================
    //  🛍️  CONFIRM BUY - PLACE ORDER
    // ============================================================
    function confirmBuy() {
      var productId = document.getElementById('buyProductId').value;
      var product = null;
      for (var i = 0; i < products.length; i++) {
        if (products[i].id == productId) {
          product = products[i];
          break;
        }
      }
      if (!product) {
        showToast('❌ Product not found.', true);
        return;
      }

      var customerName = document.getElementById('customerName').value.trim();
      var customerEmail = document.getElementById('customerEmail').value.trim();
      var customerPhone = document.getElementById('customerPhone').value.trim();
      var color = document.getElementById('buyColor').value;
      var size = document.getElementById('buySize').value;
      var service = document.getElementById('buyService').value;

      // Validate
      if (!customerName || !customerEmail || !customerPhone) {
        showToast('⚠️ Please enter your contact details.', true);
        return;
      }

      if (customerEmail.indexOf('@') === -1) {
        showToast('⚠️ Please enter a valid email address.', true);
        return;
      }

      if (!color || !size || !service) {
        showToast('⚠️ Please select color, size and service.', true);
        return;
      }

      var confirmBtn = document.getElementById('confirmBuyBtn');
      confirmBtn.disabled = true;
      confirmBtn.innerHTML = '<span class="loading-spinner"></span> Placing order...';

      var orderPayload = {
        customer_name: customerName,
        customer_email: customerEmail,
        customer_phone: customerPhone,
        product_name: product.name,
        price: product.price,
        color: color,
        size: size,
        service_method: service,
        status: 'pending',
        ordered_at: new Date().toISOString()
      };

      saveOrderToSupabase(orderPayload, function(result) {
        if (!result.success) {
          showToast('❌ Failed to save order. Please try again.', true);
          confirmBtn.disabled = false;
          confirmBtn.innerHTML = '<i class="fas fa-check-circle me-1"></i> Place Order';
          return;
        }

        var savedOrder = result.data[0];
        console.log('✅ Order saved to Supabase with ID:', savedOrder.id);

        // Send email notification
        sendOrderNotification(savedOrder);

        showToast('✅ Order placed for "' + product.name + '"! Check your email.');

        // Close modal
        var modal = bootstrap.Modal.getInstance(document.getElementById('buyNowModal'));
        if (modal) modal.hide();

        // Reset form
        document.getElementById('buyNowForm').reset();

        confirmBtn.disabled = false;
        confirmBtn.innerHTML = '<i class="fas fa-check-circle me-1"></i> Place Order';
      });
    }

    // ============================================================
    //  🛠️  PREPARE BUY NOW MODAL
    // ============================================================
    function prepareBuyNow(productId) {
      var product = null;
      for (var i = 0; i < products.length; i++) {
        if (products[i].id === productId) {
          product = products[i];
          break;
        }
      }
      if (!product) return;

      document.getElementById('productNameDisplay').textContent = product.name;
      document.getElementById('productPriceDisplay').textContent = product.price;
      document.getElementById('buyProductId').value = productId;

      var colorSelect = document.getElementById('buyColor');
      colorSelect.innerHTML = '<option value="">Select color...</option>';
      for (var c = 0; c < product.colors.length; c++) {
        colorSelect.innerHTML += '<option value="' + product.colors[c] + '">' + product.colors[c] + '</option>';
      }

      var sizeSelect = document.getElementById('buySize');
      sizeSelect.innerHTML = '<option value="">Select size...</option>';
      for (var s = 0; s < product.sizes.length; s++) {
        sizeSelect.innerHTML += '<option value="' + product.sizes[s] + '">' + product.sizes[s] + '</option>';
      }

      document.getElementById('buyService').value = '';
    }

    // ============================================================
    //  🎨  RENDER PRODUCTS
    // ============================================================
    function renderProducts() {
      var shop = document.getElementById('shop');
      shop.innerHTML = '';

      for (var i = 0; i < products.length; i++) {
        var p = products[i];

        var colorOpts = '';
        for (var c = 0; c < p.colors.length; c++) {
          colorOpts += '<option value="' + p.colors[c] + '">' + p.colors[c] + '</option>';
        }

        var sizeOpts = '';
        for (var s = 0; s < p.sizes.length; s++) {
          sizeOpts += '<option value="' + p.sizes[s] + '">' + p.sizes[s] + '</option>';
        }

        var card = document.createElement('div');
        card.className = 'col-md-4 col-lg-3 mb-4';
        card.innerHTML = `
              <div class="card shadow-sm h-100">
                <img src="${p.image}" class="card-img-top" alt="${p.name}" 
                     onerror="this.src='https://via.placeholder.com/300x220?text=No+Image'">
                <div class="card-body d-flex flex-column">
                  <h5 class="card-title">${p.name}</h5>
                  <p class="card-text fw-bold text-success">P${p.price.toFixed(2)}</p>
                  <div class="mb-2">
                    <label class="form-label small fw-semibold">Color</label>
                    <select id="color-${p.id}" class="form-select form-select-sm">${colorOpts}</select>
                  </div>
                  <div class="mb-2">
                    <label class="form-label small fw-semibold">Size</label>
                    <select id="size-${p.id}" class="form-select form-select-sm">${sizeOpts}</select>
                  </div>
                  <div class="mt-auto d-grid gap-2">
                    <button class="btn btn-primary btn-sm" onclick="addToCart(${p.id})">
                      <i class="fas fa-cart-plus me-1"></i>Add to Cart
                    </button>
                    <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#buyNowModal" 
                            onclick="prepareBuyNow(${p.id})">
                      <i class="fas fa-bolt me-1"></i>Buy Now
                    </button>
                  </div>
                </div>
              </div>
            `;
        shop.appendChild(card);
      }

      document.getElementById('productCount').textContent = products.length;
    }

    // ============================================================
    //  🚀  INIT
    // ============================================================
    function init() {
      renderProducts();
      updateCartButton();

      // Enter key support in modal
      document.getElementById('buyNowForm').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          confirmBuy();
        }
      });

      console.log('✅ Shop page loaded with ' + products.length + ' products');
    }

    // Run when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>

</body>

</html>
