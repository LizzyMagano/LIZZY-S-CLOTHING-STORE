<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop · Lizzy's Clothing Store</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    body {
      background: #f4f6fa;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    .card-img-top {
      height: 320px;
      object-fit: cover;
      background: #e9ecef;
      width: 100%;
    }
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
    }
    .modal-content {
      border-radius: 1.25rem;
    }
    .modal-header {
      background: #1e293b;
      color: white;
      border-radius: 1.25rem 1.25rem 0 0;
    }
    .modal-header .btn-close {
      filter: brightness(0) invert(1);
    }
    .btn-primary {
      background: #2563eb;
      border: none;
    }
    .btn-primary:hover {
      background: #1d4ed8;
    }
    .btn-success {
      background: #16a34a;
      border: none;
    }
    .btn-success:hover {
      background: #15803d;
    }
    .card {
      height: 100%;
      transition: transform 0.2s ease;
    }
    .card:hover {
      transform: translateY(-4px);
    }
    .card-body {
      flex: 1 1 auto;
    }
    .card-img-top {
      min-height: 320px;
    }
    .badge-status {
      font-size: 0.7rem;
      padding: 4px 10px;
    }
    .form-control:focus,
    .form-select:focus {
      border-color: #25D366;
      box-shadow: 0 0 0 0.2rem rgba(37, 211, 102, 0.25);
    }
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Lizzy's Clothing Store</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link active" href="shop.html">Shop</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
          <li class="nav-item"><a class="nav-link" href="service.html">Service</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="feedback.html">Feedback</a></li>
        </ul>
        <button id="toggleCart" class="btn btn-success ms-3" onclick="window.location.href='cart.html'">
          <i class="fas fa-shopping-cart me-1"></i> Cart (<span id="cartCount">0</span>)
        </button>
      </div>
    </div>
  </nav>

  <!-- SHOP GRID -->
  <div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3><i class="fas fa-tshirt me-2"></i>Our Collection</h3>
      <span class="badge bg-secondary"><i class="fas fa-box me-1"></i> <span id="productCount">0</span> products</span>
    </div>
    <div id="shop" class="row"></div>
  </div>

  <!-- BUY NOW MODAL -->
  <div class="modal fade" id="buyNowModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="fas fa-shopping-bag me-2"></i>Place Order</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="buyNowProductInfo" class="fw-bold mb-3 p-3 bg-light rounded">
            <i class="fas fa-tag me-2"></i> Product: <span id="productNameDisplay"></span> — P<span id="productPriceDisplay"></span>
          </div>
          <form id="buyNowForm" novalidate>
            <!-- Customer Details -->
            <div class="mb-3">
              <label for="customerName" class="form-label fw-semibold">Your Name <span class="text-danger">*</span></label>
              <input type="text" id="customerName" class="form-control" placeholder="Enter your full name" required>
            </div>
            <div class="mb-3">
              <label for="customerEmail" class="form-label fw-semibold">Email Address <span class="text-danger">*</span></label>
              <input type="email" id="customerEmail" class="form-control" placeholder="you@example.com" required>
              <div class="form-text">We'll send order confirmation here.</div>
            </div>
            <div class="mb-3">
              <label for="customerPhone" class="form-label fw-semibold">Phone Number <span class="text-danger">*</span></label>
              <input type="tel" id="customerPhone" class="form-control" placeholder="+267 78 549 270" required>
            </div>
            <hr>
            <div class="mb-3">
              <label for="buyColor" class="form-label fw-semibold">Color <span class="text-danger">*</span></label>
              <select id="buyColor" class="form-select" required>
                <option value="">Select color...</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="buySize" class="form-label fw-semibold">Size <span class="text-danger">*</span></label>
              <select id="buySize" class="form-select" required>
                <option value="">Select size...</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="buyService" class="form-label fw-semibold">Service Method <span class="text-danger">*</span></label>
              <select id="buyService" class="form-select" required>
                <option value="">Choose service...</option>
                <option value="Delivery">🚚 Delivery</option>
                <option value="Pickup">🏪 Pickup</option>
                <option value="Express">⚡ Express</option>
              </select>
            </div>
            <input type="hidden" id="buyProductId" value="" />
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" id="confirmBuyBtn" class="btn btn-success">
            <i class="fas fa-check-circle me-1"></i> Place Order
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ORDER CONFIRMATION TOAST -->
  <div class="toast-container">
    <div id="orderToast" class="toast align-items-center text-white border-0" role="alert" style="background: #1e293b;">
      <div class="d-flex">
        <div class="toast-body" id="toastMessage">
          <i class="fas fa-check-circle text-success me-2"></i> Order placed successfully!
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- ========== SUPABASE + EMAILJS ========== -->
  <script type="module">
    // ============================================================
    //  🔧  SUPABASE CONFIGURATION
    // ============================================================
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
    import emailjs from "https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js";

    const SUPABASE_URL = "https://wmebpsheblrkuvygguae.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_rUkBj0Th3x6ZXGbPkLGsHQ_f5WG3jB_";
    const ORDERS_TABLE = 'shop_orders';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ============================================================
    //  🔧  EMAILJS CONFIGURATION
    // ============================================================
    emailjs.init('p1SkBpAIthT5H_oqV');

    const EMAILJS_SERVICE_ID = 'service_0hxmvck';
    const EMAILJS_TEMPLATE_ID = 'template_us3d5rc';

    // ============================================================
    //  📦  PRODUCT DATA WITH IMAGE FILENAMES
    // ============================================================
    const products = [
      { id: 1, name: "Evening Dress", price: 1000, image: "gown.jpg", colors: ["Red", "Black", "Blue"], sizes: ["S", "M", "L"] },
      { id: 2, name: "Vintage Dress", price: 230, image: "dress.jpg", colors: ["Pink", "White"], sizes: ["M", "L"] },
      { id: 3, name: "Lady Shorts", price: 100, image: "lady shorts.jpg", colors: ["Yellow", "Green"], sizes: ["S", "M"] },
      { id: 4, name: "Plain T-Shirt", price: 80, image: "tshirt.jpg", colors: ["White", "Gray", "Black"], sizes: ["S", "M", "L", "XL"] },
      { id: 5, name: "Vintage Skirt", price: 500, image: "skirt.jpg", colors: ["Blue", "Black"], sizes: ["M", "L"] },
      { id: 6, name: "Lady Suit", price: 1200, image: "lady suit.jpg", colors: ["Blue", "Gray"], sizes: ["L", "XL"] },
      { id: 7, name: "Men's Suit", price: 900, image: "men suit.jpg", colors: ["Black", "Gray"], sizes: ["M", "L", "XL"] },
      { id: 8, name: "Men's Shorts", price: 300, image: "men shorts.jpg", colors: ["Black", "Blue"], sizes: ["S", "M", "L"] }
    ];

    // ============================================================
    //  🛒  CART FUNCTIONS
    // ============================================================
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    function updateCartButton() {
      const count = cart.length;
      document.getElementById('cartCount').textContent = count;
      document.getElementById('toggleCart').innerHTML = 
        `<i class="fas fa-shopping-cart me-1"></i> Cart (<span id="cartCount">${count}</span>)`;
    }

    function showToast(msg, isError = false) {
      const toastEl = document.getElementById('orderToast');
      const toastBody = document.getElementById('toastMessage');
      toastBody.innerHTML = msg;
      toastEl.style.background = isError ? '#dc3545' : '#1e293b';
      const toast = new bootstrap.Toast(toastEl, { delay: 3500 });
      toast.show();
    }

    function addToCart(id) {
      const product = products.find(p => p.id === id);
      const color = document.getElementById(`color-${id}`).value;
      const size = document.getElementById(`size-${id}`).value;
      
      if (!color || !size) {
        showToast('⚠️ Please select a color and size first.', true);
        return;
      }
      
      cart.push({ 
        ...product, 
        selectedColor: color, 
        selectedSize: size, 
        cartId: Date.now() + Math.random() 
      });
      localStorage.setItem("cart", JSON.stringify(cart));
      updateCartButton();
      showToast(`🛒 "${product.name}" added to cart!`);
    }

    // ============================================================
    //  📧  SEND ORDER NOTIFICATION VIA EMAILJS
    // ============================================================
    async function sendOrderNotification(orderData) {
      try {
        const orderDate = new Date(orderData.ordered_at);
        const formattedDate = orderDate.toLocaleDateString('en-BW', {
          year: 'numeric',
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });

        const templateParams = {
          order_id: orderData.id,
          customer_name: orderData.customer_name,
          customer_email: orderData.customer_email,
          product_name: orderData.product_name,
          price: orderData.price.toFixed(2),
          color: orderData.color,
          size: orderData.size,
          service_method: orderData.service_method,
          ordered_at: formattedDate,
          status: orderData.status,
          store_name: "Lizzy's Clothing Store",
          store_address: "Plot 123, Gaborone, Botswana",
          store_phone: "+267 78549270",
          store_website: window.location.origin
        };

        console.log('📧 Sending email with params:', templateParams);

        const response = await emailjs.send(
          EMAILJS_SERVICE_ID,
          EMAILJS_TEMPLATE_ID,
          templateParams
        );

        console.log('✅ Order notification sent!', response);
        return { success: true, response };

      } catch (error) {
        console.error('❌ Error sending notification:', error);
        return { success: false, error };
      }
    }

    // ============================================================
    //  📥  SAVE ORDER TO SUPABASE
    // ============================================================
    async function saveOrderToSupabase(orderData) {
      try {
        // Remove id field so Supabase auto-generates it
        const { id, ...orderWithoutId } = orderData;
        
        const { data, error } = await supabase
          .from(ORDERS_TABLE)
          .insert([orderWithoutId])
          .select();

        if (error) throw error;
        return { success: true, data };
      } catch (error) {
        console.error('❌ Supabase insert failed:', error);
        return { success: false, error };
      }
    }

    // ============================================================
    //  🛍️  CONFIRM BUY - PLACE ORDER
    // ============================================================
    async function confirmBuy() {
      const productId = document.getElementById('buyProductId').value;
      const product = products.find(p => p.id == productId);
      if (!product) { 
        showToast('❌ Product not found.', true); 
        return; 
      }

      const customerName = document.getElementById('customerName').value.trim();
      const customerEmail = document.getElementById('customerEmail').value.trim();
      const customerPhone = document.getElementById('customerPhone').value.trim();
      const color = document.getElementById('buyColor').value;
      const size = document.getElementById('buySize').value;
      const service = document.getElementById('buyService').value;

      // Validate
      if (!customerName || !customerEmail || !customerPhone) {
        showToast('⚠️ Please enter your contact details.', true);
        return;
      }

      if (!customerEmail.includes('@')) {
        showToast('⚠️ Please enter a valid email address.', true);
        return;
      }

      if (!color || !size || !service) {
        showToast('⚠️ Please select color, size and service.', true);
        return;
      }

      // Disable button
      const confirmBtn = document.getElementById('confirmBuyBtn');
      confirmBtn.disabled = true;
      confirmBtn.innerHTML = '<span class="loading-spinner"></span> Placing order...';

      try {
        // Build order data - ID will be auto-generated by Supabase
        const orderPayload = {
          customer_name: customerName,
          customer_email: customerEmail,
          customer_phone: customerPhone,
          product_name: product.name,
          price: product.price,
          color: color,
          size: size,
          service_method: service,
          status: 'pending',
          ordered_at: new Date().toISOString()
        };

        // 1. Save to Supabase (ID auto-generated)
        const result = await saveOrderToSupabase(orderPayload);

        if (!result.success) {
          showToast('❌ Failed to save order. Please try again.', true);
          confirmBtn.disabled = false;
          confirmBtn.innerHTML = '<i class="fas fa-check-circle me-1"></i> Place Order';
          return;
        }

        const savedOrder = result.data[0];
        console.log('✅ Order saved to Supabase with ID:', savedOrder.id);

        // 2. Send order confirmation email
        const emailResult = await sendOrderNotification(savedOrder);

        if (emailResult.success) {
          showToast(`✅ Order placed! Check your email for confirmation.`);
        } else {
          showToast(`✅ Order placed! We'll notify you when ready.`);
        }

        // Close modal and reset form
        const modal = bootstrap.Modal.getInstance(document.getElementById('buyNowModal'));
        if (modal) modal.hide();
        document.getElementById('buyNowForm').reset();

      } catch (error) {
        console.error('Error placing order:', error);
        showToast('❌ Error placing order. Please try again.', true);
      } finally {
        // Re-enable button
        confirmBtn.disabled = false;
        confirmBtn.innerHTML = '<i class="fas fa-check-circle me-1"></i> Place Order';
      }
    }

    // ============================================================
    //  🛠️  PREPARE BUY NOW MODAL
    // ============================================================
    function prepareBuyNow(productId) {
      const product = products.find(p => p.id === productId);
      if (!product) return;

      document.getElementById('productNameDisplay').textContent = product.name;
      document.getElementById('productPriceDisplay').textContent = product.price;
      document.getElementById('buyProductId').value = productId;

      const colorSelect = document.getElementById('buyColor');
      colorSelect.innerHTML = `<option value="">Select color...</option>`;
      product.colors.forEach(c => {
        colorSelect.innerHTML += `<option value="${c}">${c}</option>`;
      });

      const sizeSelect = document.getElementById('buySize');
      sizeSelect.innerHTML = `<option value="">Select size...</option>`;
      product.sizes.forEach(s => {
        sizeSelect.innerHTML += `<option value="${s}">${s}</option>`;
      });

      document.getElementById('buyService').value = '';
    }

    // ============================================================
    //  🎨  RENDER PRODUCTS WITH IMAGES
    // ============================================================
    function renderProducts() {
      const shop = document.getElementById('shop');
      shop.innerHTML = '';
      
      products.forEach(p => {
        const colorOpts = p.colors.map(c => `<option value="${c}">${c}</option>`).join('');
        const sizeOpts = p.sizes.map(s => `<option value="${s}">${s}</option>`).join('');
        
        const card = document.createElement('div');
        card.className = 'col-md-4 col-lg-3 mb-4';
        card.innerHTML = `
          <div class="card shadow-sm h-100">
            <img src="${p.image}" class="card-img-top" alt="${p.name}" 
                 onerror="this.src='https://via.placeholder.com/300x320?text=${encodeURIComponent(p.name)}'">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title">${p.name}</h5>
              <p class="card-text fw-bold text-success">P${p.price.toFixed(2)}</p>
              <div class="mb-2">
                <label class="form-label small fw-semibold">Color</label>
                <select id="color-${p.id}" class="form-select form-select-sm">${colorOpts}</select>
              </div>
              <div class="mb-2">
                <label class="form-label small fw-semibold">Size</label>
                <select id="size-${p.id}" class="form-select form-select-sm">${sizeOpts}</select>
              </div>
              <div class="mt-auto d-grid gap-2">
                <button class="btn btn-primary btn-sm" onclick="window.addToCart(${p.id})">
                  <i class="fas fa-cart-plus me-1"></i>Add to Cart
                </button>
                <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#buyNowModal" 
                        onclick="window.prepareBuyNow(${p.id})">
                  <i class="fas fa-bolt me-1"></i>Buy Now
                </button>
              </div>
            </div>
          </div>
        `;
        shop.appendChild(card);
      });
      
      document.getElementById('productCount').textContent = products.length;
    }

    // ============================================================
    //  🚀  INIT
    // ============================================================
    renderProducts();
    updateCartButton();

    // Attach confirmBuy to modal button
    document.getElementById('confirmBuyBtn').addEventListener('click', confirmBuy);

    // Enter key support in modal
    document.getElementById('buyNowForm').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        confirmBuy();
      }
    });

    // Expose functions to global scope
    window.addToCart = addToCart;
    window.prepareBuyNow = prepareBuyNow;
    window.confirmBuy = confirmBuy;
    window.showToast = showToast;

    console.log('✅ Shop page loaded!');
    console.log('📧 EmailJS ready to send order notifications.');
    console.log('📦 Supabase connected for order storage.');
  </script>

</body>
</html>

                                                                                   </html>
