<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - Lizzy's Clothing Store</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color:#f4f4f9;">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Lizzy's Clothing Store</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link active" href="shop.html">Shop</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
          <li class="nav-item"><a class="nav-link" href="service.html">Service</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="feedback.html">Feedback</a></li>
        </ul>
        <button id="toggleCart" class="btn btn-success ms-3">View Cart (0)</button>
      </div>
    </div>
  </nav>

  <!-- Shop Grid -->
  <div class="container my-4">
    <div id="shop" class="row"></div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const products = [
      { id: 1, name: "Evening dress", price: 1000, image: "gown.jpg", colors: ["Red", "Black", "Blue"], sizes: ["S", "M", "L"] },
      { id: 2, name: "Vintage dress", price: 230, image: "dress.jpg", colors: ["Pink", "White"], sizes: ["M", "L"] },
      { id: 3, name: "Lady shorts", price: 100, image: "lady shorts.jpg", colors: ["Yellow", "Green"], sizes: ["S", "M"] },
      { id: 4, name: "Plain T-shirt", price: 80, image: "tshirt.jpg", colors: ["White", "Gray", "Black"], sizes: ["S", "M", "L", "XL"] },
      { id: 5, name: "Vintage skirt", price: 500, image: "vintage.jpg", colors: ["Blue", "Black"], sizes: ["M", "L"] },
      { id: 6, name: "Lady suit", price: 1200, image: "lady suit.jpg", colors: ["Blue", "Gray"], sizes: ["L", "XL"] },
      { id: 7, name: "Men suits", price: 900, image: "men suit.jpg", colors: ["Black", "Gray"], sizes: ["M", "L", "XL"] },
      { id: 8, name: "Men shorts", price: 300, image: "men shorts.jpg", colors: ["Black", "Blue"], sizes: ["S", "M", "L"] }
    ];

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    const updateCartButton = () => {
      document.getElementById("toggleCart").innerText = `View Cart (${cart.length})`;
    };

    const addToCart = (id) => {
      const product = products.find((p) => p.id === id);
      const selectedColor = document.getElementById(`color-${id}`).value;
      const selectedSize = document.getElementById(`size-${id}`).value;

      cart.push({ ...product, selectedColor, selectedSize });
      localStorage.setItem("cart", JSON.stringify(cart));
      updateCartButton();
    };

    const renderProducts = () => {
      const shop = document.getElementById("shop");
      shop.innerHTML = "";
      products.forEach((product) => {
        const colors = product.colors.map(color => `<option value="${color}">${color}</option>`).join("");
        const sizes = product.sizes.map(size => `<option value="${size}">${size}</option>`).join("");

        const card = document.createElement("div");
        card.className = "col-md-4 mb-4";
        card.innerHTML = `
          <div class="card shadow-sm h-100">
            <img src="${product.image}" class="card-img-top" alt="${product.name}">
            <div class="card-body">
              <h5 class="card-title">${product.name}</h5>
              <p class="card-text">Price: P${product.price}</p>
              <div class="mb-2">
                <label class="form-label">Color</label>
                <select id="color-${product.id}" class="form-select">${colors}</select>
              </div>
              <div class="mb-2">
                <label class="form-label">Size</label>
                <select id="size-${product.id}" class="form-select">${sizes}</select>
              </div>
              <button class="btn btn-primary w-100" onclick="addToCart(${product.id})">Add to Cart</button>
            </div>
          </div>
        `;
        shop.appendChild(card);
      });
    };

    renderProducts();
    updateCartButton();
  </script>
</body>
</html>
